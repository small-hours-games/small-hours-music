<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Small Hours Music</title>
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100svh;
      position: relative;
    }

    .app {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header-title {
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .header-sub {
      color: var(--text-dim);
      font-size: 0.95rem;
      margin-top: 0.3rem;
    }

    /* Track list */
    .track-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1rem;
      background: var(--card);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      animation: fadeIn 0.3s ease-out both;
    }
    .track-item:hover {
      background: rgba(26, 25, 50, 0.95);
      border-color: rgba(127, 90, 240, 0.2);
    }
    .track-item:active { transform: scale(0.99); }
    .track-item.playing {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .track-art {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      background: var(--bg-alt);
      flex-shrink: 0;
      object-fit: cover;
    }
    .track-art-placeholder {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #fff;
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }
    .track-title {
      font-weight: 700;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-meta {
      color: var(--text-dim);
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-tags {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }
    .tag {
      padding: 0.15rem 0.5rem;
      border-radius: var(--radius-pill);
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(127, 90, 240, 0.15);
      color: var(--accent);
      border: 1px solid rgba(127, 90, 240, 0.2);
    }

    .track-duration {
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    /* Player bar */
    .player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      background: rgba(15, 14, 23, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding: 0.75rem 1rem;
      display: none;
      flex-direction: column;
      gap: 0.5rem;
    }
    .player-bar.active { display: flex; }

    .player-content {
      display: flex;
      align-items: center;
      gap: 1rem;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .player-track-info {
      flex: 1;
      min-width: 0;
    }
    .player-track-title {
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-track-meta {
      color: var(--text-dim);
      font-size: 0.75rem;
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .player-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 0.4rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, background 0.2s;
    }
    .player-btn:hover { color: var(--accent); background: rgba(127, 90, 240, 0.1); }
    .player-btn svg { width: 20px; height: 20px; }
    .player-btn.play-btn svg { width: 28px; height: 28px; }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }
    .progress-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      min-width: 3ch;
    }
    .progress-bar {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--neon));
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--text-muted);
      text-align: center;
      padding: 3rem 1rem;
    }
    .empty-state-icon {
      font-size: 3rem;
      opacity: 0.5;
    }
    .empty-state-text {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .empty-state-hint {
      font-size: 0.85rem;
      max-width: 360px;
    }

    /* Suno link */
    .track-link {
      color: var(--text-muted);
      text-decoration: none;
      flex-shrink: 0;
      padding: 0.3rem;
      border-radius: 50%;
      transition: color 0.2s;
    }
    .track-link:hover { color: var(--accent); }
    .track-link svg { width: 16px; height: 16px; }

    /* Bottom padding for player bar */
    .app.has-player { padding-bottom: 7rem; }
  </style>
</head>
<body class="bg-mesh bg-noise">

<div class="app" id="app">
  <div class="header">
    <div class="header-title gradient-text">Small Hours</div>
    <div class="header-sub">Music</div>
  </div>

  <div class="track-list" id="track-list">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">♪</div>
      <div class="empty-state-text">No tracks yet</div>
      <div class="empty-state-hint">Add tracks to data/tracks.json to get started.</div>
    </div>
  </div>
</div>

<div class="player-bar" id="player-bar">
  <div class="player-content">
    <div class="player-track-info">
      <div class="player-track-title" id="player-title">—</div>
      <div class="player-track-meta" id="player-meta"></div>
    </div>
    <div class="player-controls">
      <button class="player-btn" id="prev-btn" title="Previous">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="player-btn play-btn" id="play-btn" title="Play/Pause">
        <svg viewBox="0 0 24 24" fill="currentColor" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="player-btn" id="next-btn" title="Next">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
  </div>
  <div class="progress-row">
    <span class="progress-time" id="time-current">0:00</span>
    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <span class="progress-time" id="time-total">0:00</span>
  </div>
</div>

<audio id="audio"></audio>

<script>
  const audio = document.getElementById('audio');
  const trackListEl = document.getElementById('track-list');
  const emptyState = document.getElementById('empty-state');
  const playerBar = document.getElementById('player-bar');
  const appEl = document.getElementById('app');
  const playerTitle = document.getElementById('player-title');
  const playerMeta = document.getElementById('player-meta');
  const playBtn = document.getElementById('play-btn');
  const playIcon = document.getElementById('play-icon');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const progressBar = document.getElementById('progress-bar');
  const progressFill = document.getElementById('progress-fill');
  const timeCurrent = document.getElementById('time-current');
  const timeTotal = document.getElementById('time-total');

  let tracks = [];
  let currentIndex = -1;

  const PAUSE_PATH = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';
  const PLAY_PATH = 'M8 5v14l11-7z';

  function formatTime(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  function renderTracks() {
    if (!tracks.length) {
      emptyState.style.display = '';
      return;
    }
    emptyState.style.display = 'none';

    for (let i = 0; i < tracks.length; i++) {
      const t = tracks[i];
      const el = document.createElement('div');
      el.className = 'track-item';
      el.dataset.index = i;
      el.style.animationDelay = `${i * 0.04}s`;

      const art = t.image
        ? `<img class="track-art" src="${t.image}" alt="">`
        : `<div class="track-art-placeholder">♪</div>`;

      const tags = (t.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('');

      const sunoLink = t.sunoUrl
        ? `<a class="track-link" href="${t.sunoUrl}" target="_blank" rel="noopener" title="Open on Suno" onclick="event.stopPropagation()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
           </a>`
        : '';

      el.innerHTML = `
        ${art}
        <div class="track-info">
          <div class="track-title">${t.title || 'Untitled'}</div>
          <div class="track-meta">${t.artist || ''}${tags ? ' ' : ''}${tags}</div>
        </div>
        ${sunoLink}
        <div class="track-duration">${t.duration || ''}</div>
      `;

      el.addEventListener('click', () => playTrack(i));
      trackListEl.appendChild(el);
    }
  }

  function updatePlayingState() {
    document.querySelectorAll('.track-item').forEach((el, i) => {
      el.classList.toggle('playing', i === currentIndex);
    });
  }

  function playTrack(index) {
    if (index < 0 || index >= tracks.length) return;
    const t = tracks[index];
    currentIndex = index;

    if (t.audioUrl) {
      audio.src = t.audioUrl;
      audio.play();
    }

    playerTitle.textContent = t.title || 'Untitled';
    playerMeta.textContent = t.artist || '';
    playerBar.classList.add('active');
    appEl.classList.add('has-player');
    playIcon.innerHTML = `<path d="${PAUSE_PATH}"/>`;
    updatePlayingState();
  }

  playBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      playIcon.innerHTML = `<path d="${PAUSE_PATH}"/>`;
    } else {
      audio.pause();
      playIcon.innerHTML = `<path d="${PLAY_PATH}"/>`;
    }
  });

  prevBtn.addEventListener('click', () => {
    if (currentIndex > 0) playTrack(currentIndex - 1);
    else if (tracks.length) playTrack(tracks.length - 1);
  });

  nextBtn.addEventListener('click', () => {
    if (currentIndex < tracks.length - 1) playTrack(currentIndex + 1);
    else if (tracks.length) playTrack(0);
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = `${pct}%`;
    timeCurrent.textContent = formatTime(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => {
    timeTotal.textContent = formatTime(audio.duration);
  });

  audio.addEventListener('ended', () => {
    if (currentIndex < tracks.length - 1) playTrack(currentIndex + 1);
    else {
      playIcon.innerHTML = `<path d="${PLAY_PATH}"/>`;
    }
  });

  progressBar.addEventListener('click', (e) => {
    if (!audio.duration) return;
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  // Load tracks
  fetch('/api/tracks')
    .then(r => r.json())
    .then(data => {
      tracks = data;
      renderTracks();
    })
    .catch(() => {});
</script>
</body>
</html>
